name: Corpus Validation

on:
  pull_request:
    branches: [main, arena-v1-build]
    paths:
      - 'cases/**'
      - 'competitors/**'
      - 'config/**'
      - 'src/corpus/**'

jobs:
  validate:
    name: Validate corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate cases and competitors
        run: npm run cases:validate
